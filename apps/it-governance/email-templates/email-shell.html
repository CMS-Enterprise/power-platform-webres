<!doctype html>
<html
  lang="en"
  dir="ltr"
  xmlns:v="urn:schemas-microsoft-com:vml"
  xmlns:o="urn:schemas-microsoft-com:office:office"
>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="format-detection"
      content="telephone=no, date=no, address=no, email=no, url=no"
    />
    <meta name="x-apple-disable-message-reformatting" />

    <!--[if mso]>
      <noscript>
        <xml>
          <o:OfficeDocumentSettings>
            <o:PixelsPerInch>96</o:PixelsPerInch>
          </o:OfficeDocumentSettings>
        </xml>
      </noscript>
    <![endif]-->

    <!--[if mso]>
      <style>
        table,
        tr,
        td,
        p,
        span,
        a {
          mso-line-height-rule: exactly !important;
        }
        table {
          border-collapse: collapse !important;
        }
      </style>
    <![endif]-->

    <style>
      /* Prevent iOS and some clients from auto-link styling */
      a[x-apple-data-detectors],
      u + #body a,
      #MessageViewBody a {
        color: inherit !important;
        text-decoration: none !important;
        font-size: inherit !important;
        font-family: inherit !important;
        font-weight: inherit !important;
        line-height: inherit !important;
      }

      /* Mobile */
      @media only screen and (max-width: 599px) {
        .container {
          width: 100% !important;
        }
        .content-padding {
          padding: 20px !important;
        }
      }

      @import url("https://fonts.googleapis.com/css2?family=Public+Sans&display=swap");
      p,
      h1,
      h2,
      h3,
      li {
        font-family: "Public Sans", Arial, sans-serif;
        color: #1b1b1b;
      }
      a {
        font-family: "Public Sans", Arial, sans-serif;
      }
      .header-subtitle {
        font-size: 15px;
        color: #71767a;
        margin: 0.5rem 0 2rem;
      }
      .no-margin,
      .no-margin * {
        margin-top: 0;
        margin-bottom: 0;
      }
      .header-title,
      .no-margin-bottom {
        margin-bottom: 0;
      }
      .no-margin-top {
        margin-top: 0;
      }
      hr {
        border-style: solid;
        border-color: #bbb;
        border-radius: 2px;
      }

      .mention {
        color: #005ea2;
      }

      .quote > p:first-of-type {
        margin-top: 0;
      }
      .quote > p:first-of-type::before {
        content: "\201C";
      }
      .quote > p:last-of-type {
        margin-bottom: 0;
      }
      .quote > p:last-of-type::after {
        content: "\201D";
      }
    </style>
  </head>

  <body id="body" style="margin: 0; padding: 0; background-color: #f4f4f4">
    <!-- Outer wrapper -->
    <table
      role="presentation"
      cellpadding="0"
      cellspacing="0"
      border="0"
      width="100%"
      style="background-color: #f4f4f4; border-collapse: collapse"
    >
      <tr>
        <td align="center" style="padding: 30px 10px">
          <!--[if mso]>
        <table role="presentation" border="0" cellpadding="0" cellspacing="0" width="600">
          <tr>
            <td>
        <![endif]-->

          <!-- Container -->
          <table
            role="presentation"
            cellpadding="0"
            cellspacing="0"
            border="0"
            width="600"
            class="container"
            style="
              width: 600px;
              max-width: 600px;
              background-color: #ffffff;
              border-collapse: collapse;
            "
          >
            <!-- Optional header row (safe to leave empty) -->
            <tr>
              <td
                style="
                  padding: 24px 30px 0 30px;
                  font-family: Arial, sans-serif;
                "
              >
                {{HEADER_HTML}}
              </td>
            </tr>

            <!-- Main content -->
            <tr>
              <td
                class="content-padding"
                style="
                  padding: 24px 30px 24px 30px;
                  font-family: Arial, sans-serif;
                  font-size: 16px;
                  line-height: 24px;
                  color: #000000;
                "
              >
                {{BODY_HTML}}
              </td>
            </tr>

            <!-- Optional footer row (safe to leave empty) -->
            <tr>
              <td
                style="
                  padding: 0 30px 24px 30px;
                  font-family: Arial, sans-serif;
                  font-size: 12px;
                  line-height: 18px;
                  color: #777777;
                "
              >
                {{FOOTER_HTML}}
              </td>
            </tr>
          </table>

          <!--[if mso]>
            </td>
          </tr>
        </table>
        <![endif]-->
        </td>
      </tr>
    </table>
  </body>
</html>
