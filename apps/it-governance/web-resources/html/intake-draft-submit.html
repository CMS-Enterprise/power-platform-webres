<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Intake Request Draft</title>
    <style>
      /* Base */
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        line-height: 1.428571429;
        color: #323130;
        background-color: #faf9f8;
        margin: 0;
        padding: 12px;
      }

      /* Primary button */
      .btn-primary {
        background-color: #0078d4;
        border: 1px solid #0078d4;
        color: #ffffff;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 400;
        border-radius: 5px;
        cursor: pointer;
        transition:
          background-color 0.15s ease-in-out,
          border-color 0.15s ease-in-out;
      }
      .btn-primary:hover {
        background-color: #106ebe;
        border-color: #106ebe;
      }
      .btn-primary:focus {
        outline: 1px solid #ffffff;
        outline-offset: 2px;
        box-shadow: 0 0 0 2px #0078d4;
      }

      /* Success alert */
      .alert {
        padding: 12px 16px;
        margin: 12px 0;
        border-radius: 4px;
        border-left: 6px solid #107c10;
        background-color: #dff6dd;
        color: #0b5a0b;
      }

      /* Hide/show utility */
      .hidden {
        display: none;
      }

      @media (max-width: 768px) {
        body {
          padding: 8px;
        }
      }
    </style>
    <script>
      const PAGE_REQUIRED_FIELDS = {
        REQUEST_TYPE: [],
        GOVERNANCE_STEPS: [],
        INTAKE: [
          "cr69a_requester",
          "cr69a_requestercomponent",
          "cr69a_cmsbusinessownername",
          "cr69a_cmsbusinessownercomponent",
          "cr69a_cmsprojectproductmanager",
          "cr69a_cmsproductmanagercomponent",
          "cr69a_collaborators",
          // "cr69a_business_need", Deprecated
          "cr3ee_business_need_multi",
          // "cr69a_solution", Deprecated
          "cr3ee_proposedsolution",
          "cr69a_current_process_status",
          "cr69a_enterprise_architecture_support",
          "cr69a_ai_technologies_used",
          "cr69a_interface_component",
          "cr69a_software_products",
          // "cr69a_annual_spending",
          "cr3ee_currentannualspending",
          // "cr69a_current_it_spending_portion",
          "cr3ee_annualspendingitpercentage",
          // "cr69a_planned_annual_spending",
          "cr3ee_plannedannualspendingoffirstyear",
          // "cr69a_whatportionofyr1plannedannualspendingisit",
          "cr3ee_itpercentageofy1annualspending",
          // "cr69a_doesthisrequestalreadyhavecontractsupport",
        ],
        BUSINESS_CASE: ["cr69a_businesscase"],
        GRT_MEETING: [],
        FINAL_BUSINESS_CASE: ["cr69a_finalbusinesscase"],
        GRB_REVIEW: [],
        AWAITING_DECISION: [],
        DECISION: [],
        FINISHED: [],
      };

      const BPF_STAGES = {
        DRAFT: 971270006,
        INTAKE_REQUEST_REVIEW: 971270000,
        DRAFT_BUSINESS_CASE: 971270001,
        SCHEDULE_GRT_MEETING: 100000001,
        GRT_MEETING: 971270002,
        FINAL_BUSINESS_CASE: 971270003,
        SCHEDULE_GRB_REVIEW: 100000002,
        GRB_REVIEW: 971270004,
        AWAITING_DECISION: 971270007,
        DECISION: 971270005,
        ISSUE_LCID: 971270008,
        FINISHED: 971270009,
        REQUEST_TYPE: 971270010,
        GOVERNANCE_PROCESS_STEPS: 971270011,
      };

      const ALWAYS_REQUIRED_FIELDS = [];

      const STAGE_TO_PAGE = {
        [BPF_STAGES.REQUEST_TYPE]: "REQUEST_TYPE",
        [BPF_STAGES.GOVERNANCE_PROCESS_STEPS]: "GOVERNANCE_STEPS",
        [BPF_STAGES.DRAFT]: "INTAKE",
        [BPF_STAGES.INTAKE_REQUEST_REVIEW]: "INTAKE",
        [BPF_STAGES.DRAFT_BUSINESS_CASE]: "BUSINESS_CASE",
        [BPF_STAGES.SCHEDULE_GRT_MEETING]: "GRT_MEETING",
        [BPF_STAGES.GRT_MEETING]: "GRT_MEETING",
        [BPF_STAGES.FINAL_BUSINESS_CASE]: "FINAL_BUSINESS_CASE",
        [BPF_STAGES.SCHEDULE_GRB_REVIEW]: "GRB_REVIEW",
        [BPF_STAGES.GRB_REVIEW]: "GRB_REVIEW",
        [BPF_STAGES.AWAITING_DECISION]: "AWAITING_DECISION",
        [BPF_STAGES.DECISION]: "DECISION",
        [BPF_STAGES.ISSUE_LCID]: "DECISION",
        [BPF_STAGES.FINISHED]: "FINISHED",
      };
      function getParentForm() {
        return parent && parent.Xrm && parent.Xrm.Page ? parent.Xrm.Page : null;
      }

      function getAttr(form, schema) {
        return form ? form.getAttribute(schema) : null;
      }

      function showSuccess(text) {
        var box = document.getElementById("submitStatus");
        if (!box) return;
        box.textContent =
          text ||
          "System Intake Draft successfully submitted. Waiting for feedback.";
        box.classList.remove("hidden");
        var submitButton = document.getElementById("submitIntakeRequestButton");
        if (!submitButton) return;
        submitButton.classList.add("hidden");
      }

      const DRAFT_STATE = 971270000;
      const REQUEST_STATUS = "cr69a_status";

      const ADMIN_GOV_TASK_LIST_STEP_FIELD = "new_admingovernanceprocessstep";
      const INTAKE_REQUEST_REVIEW = 971270000;

      
      function shouldShowSuccessOnLoad() {
        const form = getParentForm();
        if (!form) return false;

        const submittedAttr = getAttr(form, REQUEST_STATUS);

        const isSubmitted =
          submittedAttr && submittedAttr.getValue() != DRAFT_STATE;
        const rfrAttr = getAttr(form, "cr69a_readyforreview");
        const isReadyForReview = rfrAttr && rfrAttr.getValue() === true;

        return isSubmitted && isReadyForReview;
      }

      function initBannerFromFields() {
        if (shouldShowSuccessOnLoad()) {
          showSuccess(
            "System Intake Draft successfully submitted. Waiting for feedback.",
          );
        }
      }

      function getAllWizardRequiredFields() {
        const all = new Set(ALWAYS_REQUIRED_FIELDS);
        Object.values(PAGE_REQUIRED_FIELDS).forEach((arr) => {
          (arr || []).forEach((f) => all.add(f));
        });
        return Array.from(all);
      }

      function setFieldRequired(logicalName, isRequired) {
        const form = getParentForm();
        var REQUIRED = false;
        if (!form) {
          console.error("Could not access parent form context.");
          showError("Unable to access form. Please refresh and try again.");
          return;
        }
        const attr = getAttr(form, logicalName);
        const attrValue = getAttr(form, logicalName).getValue();
        //const attr = formContext.getAttribute(logicalName);
        if (!attr) {
          console.warn(
            `Required mapping references missing attribute: ${logicalName}`,
          );
          return;
        }
        if(!attrValue) {
          form.getControl(logicalName).setNotification("Field is required");
          parent.Xrm.App.addGlobalNotification({
            type: 2, // 2 = banner
            level: 1, // "INFO" | "WARNING" | "ERROR"
            message: `${logicalName}: Field is required`,
            showCloseButton: true,
          });
          REQUIRED = true;
        }
        // attr.setRequiredLevel(isRequired ? "required" : "none");
        console.log(REQUIRED);
        return(REQUIRED);
      }

      function setFieldUnrequired(logicalName, isRequired) {
        const form = getParentForm();
        if (!form) {
          console.error("Could not access parent form context.");
          showError("Unable to access form. Please refresh and try again.");
          return;
        }
        const attr = getAttr(form, logicalName);
        //const attr = formContext.getAttribute(logicalName);
        if (!attr) {
          console.warn(
            `Required mapping references missing attribute: ${logicalName}`,
          );
          return;
        }
        form.getControl(logicalName).clearNotification();
        // attr.setRequiredLevel(isRequired ? "none" : "none");
      }

      function applyRequiredFieldsForPage(pageName) {
        if (!Object.prototype.hasOwnProperty.call(PAGE_REQUIRED_FIELDS, pageName)) {
          console.error(`Unknown pageName for required fields: ${pageName}`);
          return;
        }

        const allWizardFields = getAllWizardRequiredFields();
        const pageFields = new Set([
          ...(PAGE_REQUIRED_FIELDS[pageName] || []),
          ...ALWAYS_REQUIRED_FIELDS,
        ]);

        // First, clear required for all wizard-managed fields
        allWizardFields.forEach((fieldName) =>
          setFieldRequired(fieldName, false),
          //setFieldRequired(formContext, fieldName, false),
        );

        // Then, set required only for current page fields
        pageFields.forEach((fieldName) =>
          setFieldRequired(fieldName, true),
          // setFieldRequired(formContext, fieldName, true),
        );
      }

      function applyUnrequiredFieldsForPage(pageName) {
        if (!Object.prototype.hasOwnProperty.call(PAGE_REQUIRED_FIELDS, pageName)) {
          console.error(`Unknown pageName for required fields: ${pageName}`);
          return;
        }

        const allWizardFields = getAllWizardRequiredFields();
        const pageFields = new Set([
          ...(PAGE_REQUIRED_FIELDS[pageName] || []),
          ...ALWAYS_REQUIRED_FIELDS,
        ]);

        // First, clear required for all wizard-managed fields
        allWizardFields.forEach((fieldName) =>
          setFieldUnrequired(fieldName, false),
          //setFieldRequired(formContext, fieldName, false),
        );

        // Then, set required only for current page fields
        pageFields.forEach((fieldName) =>
          setFieldUnrequired(fieldName, true),
          // setFieldRequired(formContext, fieldName, true),
        );
      }

      function submitIntakeRequestDraft() {
        const form = getParentForm();
        if (!form) {
          console.error("Could not access parent form context.");
          showError("Unable to access form. Please refresh and try again.");
          return;
        }
        const stage = form
          .getAttribute("new_admingovernanceprocessstep")
          ?.getValue();
        // const stage = formContext
        //   .getAttribute("new_admingovernanceprocessstep")
        //   ?.getValue();

        const isNew = !form.data.entity.getId();

        // new record should start at request type page
        const pageName = isNew ? "REQUEST_TYPE" : STAGE_TO_PAGE[stage] || "INTAKE";
        const req = applyRequiredFieldsForPage(pageName);
        // applyRequiredFieldsForPage(formContext, pageName);
        console.log(req);
        if(req === false)
        {
          try {
            const form = getParentForm();
            if (!form) {
              console.error("Could not access parent form context.");
              return;
            }

            // 1) Mark status as Submitted
            const statusAttr = getAttr(form, REQUEST_STATUS);
            if (!statusAttr) {
              console.error("Could not access Form Status field.");
              return;
            }
            statusAttr.setValue(971270002);

            const taskListStep = getAttr(form, ADMIN_GOV_TASK_LIST_STEP_FIELD);
            if (!taskListStep) {
              console.error("Could not access Form Status field.");
              return;
            }
            taskListStep.setValue(INTAKE_REQUEST_REVIEW);

            // 2) Set Ready For Review
            const rfr = form.getAttribute("cr69a_readyforreview");
            if (!rfr) {
              console.error("Could not access ready for review.");
              return;
            }
            rfr.setValue(true);

            // 3) Save form
            form.data.save().then(
              function () {
                if (parent.lockAllFields) {
                  parent.lockAllFields(form);
                } else {
                  console.warn(
                    "lockAllFields function not found on parent window",
                  );
                }
                taskListStep.fireOnChange();
                // notify("System Intake Form successfully submitted.", "success");
                showSuccess(
                  "Your Intake Request form has been submitted. You will receive an automatic email, and a Governance Admin Team member will reach out shortly regarding next steps.",
                );
              },
              function (err) {
                console.error(
                  "Save failed:",
                  err && err.message ? err.message : err,
                );
                // setTimeout(() => {applyUnrequiredFieldsForPage(pageName)}, 10000);
              },
            );
          } catch (e) {
            console.error("Unexpected error during submit:", e);
          }
        }
        setTimeout(() => {applyUnrequiredFieldsForPage(pageName)}, 10000);
      }

      document.addEventListener("DOMContentLoaded", initBannerFromFields);
    </script>
  </head>
  <body>
    <div
      id="submitStatus"
      class="alert hidden"
      role="status"
      aria-live="polite"
    ></div>

    <div style="text-align: right">
      <button
        id="submitIntakeRequestButton"
        class="btn-primary"
        onclick="submitIntakeRequestDraft()"
      >
        Submit Intake Request Draft
      </button>
    </div>
  </body>
</html>
