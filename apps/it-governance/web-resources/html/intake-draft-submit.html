<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Submit Intake Request Draft</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        font-size: 14px;
        line-height: 1.428571429;
        color: #323130;
        background-color: #faf9f8;
        margin: 0;
        padding: 12px;
      }

      .btn-primary {
        background-color: #0078d4;
        border: 1px solid #0078d4;
        color: #ffffff;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 400;
        border-radius: 5px;
        cursor: pointer;
        transition:
          background-color 0.15s ease-in-out,
          border-color 0.15s ease-in-out;
      }

      .btn-primary:hover {
        background-color: #106ebe;
        border-color: #106ebe;
      }

      .btn-primary:focus {
        outline: 1px solid #ffffff;
        outline-offset: 2px;
        box-shadow: 0 0 0 2px #0078d4;
      }

      .alert {
        padding: 12px 16px;
        margin: 12px 0;
        border-radius: 4px;
        border-left: 6px solid #107c10;
        background-color: #dff6dd;
        color: #0b5a0b;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 768px) {
        body {
          padding: 8px;
        }
      }
    </style>
    <script>
      const PAGE_REQUIRED_FIELDS = [
        "cr69a_requester",
        "cr69a_requestercomponent",
        "cr69a_cmsbusinessownername",
        "cr69a_cmsbusinessownercomponent",
        "cr69a_cmsprojectproductmanager",
        "cr69a_cmsproductmanagercomponent",
        "cr69a_collaborators",
        "cr3ee_business_need_multi",
        "cr3ee_proposedsolution",
        "cr69a_current_process_status",
        "cr69a_enterprise_architecture_support",
        "cr69a_ai_technologies_used",
        "cr69a_interface_component",
        "cr69a_software_products",
        "cr3ee_currentannualspending",
        "cr3ee_annualspendingitpercentage",
        "cr3ee_plannedannualspendingoffirstyear",
        "cr3ee_itpercentageofy1annualspending",
      ];

      const DRAFT_STATE = 971270000;
      const SUBMITTED_STATE = 971270002;
      const REQUEST_STATUS = "cr69a_status";
      const READY_FOR_REVIEW_FIELD = "cr69a_readyforreview";
      const ADMIN_GOV_TASK_LIST_STEP_FIELD = "new_admingovernanceprocessstep";
      const INTAKE_REQUEST_REVIEW = 971270000;
      const SUBMIT_WARNING_ID = "submit_missing_fields_warning";

      function getParentForm() {
        return parent && parent.Xrm && parent.Xrm.Page ? parent.Xrm.Page : null;
      }

      function showSuccess(text) {
        const box = document.getElementById("submitStatus");
        if (!box) return;

        box.textContent =
          text ||
          "System Intake Draft successfully submitted. Waiting for feedback.";
        box.classList.remove("hidden");
        box.style.borderLeftColor = "#107c10";
        box.style.backgroundColor = "#dff6dd";
        box.style.color = "#0b5a0b";

        const submitButton = document.getElementById(
          "submitIntakeRequestButton",
        );
        if (submitButton) {
          submitButton.classList.add("hidden");
        }
      }

      function showError(text) {
        const box = document.getElementById("submitStatus");
        if (!box) return;

        box.textContent = text || "Something went wrong.";
        box.classList.remove("hidden");
        box.style.borderLeftColor = "#d13438";
        box.style.backgroundColor = "#fde7e9";
        box.style.color = "#a4262c";
      }

      function clearBanner() {
        const box = document.getElementById("submitStatus");
        if (!box) return;

        box.textContent = "";
        box.classList.add("hidden");
      }

      function showMissingFieldsWarning(formContext, missingFieldLabels) {
        formContext.ui.clearFormNotification(SUBMIT_WARNING_ID);

        const message =
          "Your request has been saved, but these fields are still required before submission: " +
          missingFieldLabels.join(", ");

        formContext.ui.setFormNotification(
          message,
          "WARNING",
          SUBMIT_WARNING_ID,
        );
      }

      function clearMissingFieldsWarning(formContext) {
        formContext.ui.clearFormNotification(SUBMIT_WARNING_ID);
      }

      function shouldShowSuccessOnLoad() {
        const form = getParentForm();
        if (!form) return false;

        const submittedAttr = form.getAttribute(REQUEST_STATUS);
        const rfrAttr = form.getAttribute(READY_FOR_REVIEW_FIELD);

        const submittedValue = submittedAttr ? submittedAttr.getValue() : null;
        const rfrValue = rfrAttr ? rfrAttr.getValue() : null;

        const isSubmitted =
          submittedValue !== null && submittedValue !== DRAFT_STATE;
        const isReadyForReview = rfrValue === true;

        return isSubmitted && isReadyForReview;
      }

      function initBannerFromFields() {
        if (shouldShowSuccessOnLoad()) {
          showSuccess(
            "System Intake Draft successfully submitted. Waiting for feedback.",
          );
        }
      }

      function validateFields(form) {
        let allValid = true;
        const missingFieldLabels = [];

        PAGE_REQUIRED_FIELDS.forEach(function (fieldName) {
          const attribute = form.getAttribute(fieldName);
          const control = form.getControl(fieldName);

          if (!attribute) {
            allValid = false;
            missingFieldLabels.push(fieldName);
            return;
          }

          const value = attribute.getValue();
          const isEmpty =
            value === null ||
            (typeof value === "string" && value.trim() === "") ||
            (Array.isArray(value) && value.length === 0);

          if (isEmpty) {
            allValid = false;

            if (control && typeof control.getLabel === "function") {
              missingFieldLabels.push(control.getLabel());
            } else {
              missingFieldLabels.push(fieldName);
            }
          }
        });

        return {
          allValid: allValid,
          missingFieldLabels: missingFieldLabels,
        };
      }

      function submitIntakeRequestDraft() {
        const form = getParentForm();

        if (!form) {
          console.error("Could not access parent form context.");
          showError("Unable to access form. Please refresh and try again.");
          return;
        }

        clearBanner();
        clearMissingFieldsWarning(form);

        const submitButton = document.getElementById(
          "submitIntakeRequestButton",
        );
        if (submitButton) {
          submitButton.disabled = true;
        }

        const validationResult = validateFields(form);
        const allValid = validationResult.allValid;
        const missingFieldLabels = validationResult.missingFieldLabels;

        console.log("allValid", allValid);

        if (!allValid) {
          form.data.save().then(
            function () {
              showMissingFieldsWarning(form, missingFieldLabels);
              if (submitButton) {
                submitButton.disabled = false;
              }
            },
            function (err) {
              console.error(
                "Save failed:",
                err && err.message ? err.message : err,
              );
              showMissingFieldsWarning(form, missingFieldLabels);
              showError(
                "Your request could not be submitted, and the draft could not be saved. Please try again or refresh the form.",
              );
              if (submitButton) {
                submitButton.disabled = false;
              }
            },
          );
          return;
        }

        try {
          const statusAttr = form.getAttribute(REQUEST_STATUS);
          if (!statusAttr) {
            console.error("Could not access Request Status field.");
            showError(
              "Unable to submit because a required system field is unavailable.",
            );
            if (submitButton) submitButton.disabled = false;
            return;
          }
          statusAttr.setValue(SUBMITTED_STATE);

          const taskListStep = form.getAttribute(
            ADMIN_GOV_TASK_LIST_STEP_FIELD,
          );
          if (!taskListStep) {
            console.error(
              "Could not access Admin Governance Process Step field.",
            );
            showError(
              "Unable to submit because a required system field is unavailable.",
            );
            if (submitButton) submitButton.disabled = false;
            return;
          }
          taskListStep.setValue(INTAKE_REQUEST_REVIEW);
          taskListStep.fireOnChange();

          const rfr = form.getAttribute(READY_FOR_REVIEW_FIELD);
          if (!rfr) {
            console.error("Could not access ready for review.");
            showError(
              "Unable to submit because a required system field is unavailable.",
            );
            if (submitButton) submitButton.disabled = false;
            return;
          }
          rfr.setValue(true);

          clearMissingFieldsWarning(form);

          form.data.save().then(
            function () {
              if (parent.lockAllFields) {
                parent.lockAllFields(form);
              } else {
                console.warn(
                  "lockAllFields function not found on parent window",
                );
              }

              showSuccess(
                "Your Intake Request form has been submitted. You will receive an automatic email, and a Governance Admin Team member will reach out shortly regarding next steps.",
              );
            },
            function (err) {
              console.error(
                "Save failed:",
                err && err.message ? err.message : err,
              );
              showError("Save failed. Please try again or refresh the form.");
              if (submitButton) {
                submitButton.disabled = false;
              }
            },
          );
        } catch (e) {
          console.error("Unexpected error during submit:", e);
          showError("An unexpected error occurred while submitting.");
          if (submitButton) {
            submitButton.disabled = false;
          }
        }
      }

      document.addEventListener("DOMContentLoaded", initBannerFromFields);
    </script>
  </head>
  <body>
    <div
      id="submitStatus"
      class="alert hidden"
      role="status"
      aria-live="polite"
    ></div>

    <div style="text-align: right">
      <button
        id="submitIntakeRequestButton"
        class="btn-primary"
        onclick="submitIntakeRequestDraft()"
      >
        Submit Intake Request Draft
      </button>
    </div>
  </body>
</html>
