<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Questions About Decision</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        color: #242424;
        background: #ffffff;
        line-height: 1.5;
        margin: 0;
      }

      h1 {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 16px 0;
        color: #1f1f1f;
      }

      h2 {
        font-size: 16px;
        font-weight: 600;
        margin: 28px 0 8px 0;
        color: #1f1f1f;
      }

      p {
        margin: 0 0 12px 0;
        font-size: 14px;
      }

      .info-banner {
        display: flex;
        gap: 12px;
        align-items: flex-start;
        background: #e8f3f8;
        border-left: 4px solid #00b7c3;
        padding: 14px 16px;
        margin-bottom: 18px;
      }

      .info-banner .icon {
        font-size: 16px;
        line-height: 1.2;
        color: #1f1f1f;
        margin-top: 1px;
      }

      .muted-label {
        font-size: 14px;
        margin-bottom: 4px;
      }

      .muted-date {
        font-size: 14px;
        color: #6b6b6b;
        margin-bottom: 8px;
      }

      ul {
        margin: 8px 0 12px 18px;
        padding: 0 0 0 12px;
      }

      li {
        margin-bottom: 4px;
        font-size: 14px;
      }

      a {
        color: #005ea2;
        text-decoration: underline;
      }

      a:hover {
        text-decoration: none;
      }

      .cta-link {
        display: inline-block;
        margin-top: 4px;
        font-size: 14px;
        font-weight: 500;
      }

      .callout-card {
        background: #dff1f7;
        border: 1px solid #8fd3e8;
        border-radius: 2px;
        padding: 12px;
      }

      .callout-card h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
        font-weight: 600;
        color: #1f1f1f;
      }

      .callout-card p {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="callout-card">
        <h3>Have questions about this decision?</h3>
        <p>
          Contact the Governance Team at
          <a href="mailto:IT_Governance@cms.hhs.gov">
            IT_Governance@cms.hhs.gov </a
          >.
        </p>
      </div>
    </div>
  </body>
</html>
